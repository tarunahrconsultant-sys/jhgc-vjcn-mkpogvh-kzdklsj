<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>javascript string method</h2>
    <p>the sting method can convert a number to a string</p>
    <p id="a"></p>
    <p id="b"></p>
    <script>
        var x=5
        var y=4
        document.getElementById("a").innerHTML=x+y
        document.getElementById("b").innerHTML = String(x)+String(y)
    </script>
</body>
</html>
